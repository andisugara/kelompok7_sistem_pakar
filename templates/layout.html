<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RoseCare - Sistem Pakar Diagnosis Mawar{% endblock %}</title>
    <!-- Google Fonts: Outfit for modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        botanical: {
                            50: '#f2f9f5',
                            100: '#e2f2e7',
                            200: '#c7e5d2',
                            300: '#9ccfb1',
                            400: '#6bb38b',
                            500: '#46966b',
                            600: '#347a55',
                            700: '#2a6245',
                            800: '#234f39',
                            900: '#1d4230',
                            950: '#0a1a13', // Deep botanical green for dark elements
                        },
                        roseaccent: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            200: '#fecdd3',
                            300: '#fda4af',
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                            700: '#be123c',
                            800: '#9f1239',
                            900: '#881337',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#22c55e10 1px, transparent 1px), radial-gradient(#ec489910 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }
    </style>
</head>

<body class="bg-pattern min-h-screen flex flex-col text-slate-800">

    <!-- Header / Navbar: Deep dark botanical green so the white logo-panjang is visible -->
    <header class="bg-botanical-950 text-white shadow-lg sticky top-0 z-50 border-b border-botanical-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">

                <!-- Logo Horizontal (kiri logo kanan tulisan - di dalam file logo-panjang.png) -->
                <div class="flex items-center">
                    <a href="{{ url_for('index') }}" class="flex items-center">
                        <img src="{{ url_for('static', filename='images/logo-panjang.png') }}" alt="RoseCare Logo"
                            class="h-12 w-auto object-contain hover:opacity-90 transition-opacity">
                    </a>
                </div>

                <!-- Navigation Links -->
                <nav class="hidden md:flex space-x-8 text-sm font-semibold tracking-wide">
                    <a href="{{ url_for('index') }}"
                        class="hover:text-roseaccent-300 px-3 py-2 rounded-md transition duration-250">Beranda</a>
                    <a href="{{ url_for('diagnose') }}"
                        class="hover:text-roseaccent-300 px-3 py-2 rounded-md transition duration-250">Mulai
                        Diagnosis</a>
                    <a href="{{ url_for('diseases') }}"
                        class="hover:text-roseaccent-300 px-3 py-2 rounded-md transition duration-250">Kamus
                        Penyakit</a>
                </nav>

                <!-- Mobile Menu Button -->
                <div class="flex md:hidden">
                    <button type="button" id="mobile-menu-btn"
                        class="inline-flex items-center justify-center p-2 rounded-md text-emerald-400 hover:text-white hover:bg-botanical-900 focus:outline-none"
                        aria-controls="mobile-menu" aria-expanded="false">
                        <span class="sr-only">Open main menu</span>
                        <svg class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Navigation Menu -->
        <div class="hidden md:hidden bg-botanical-900 border-t border-botanical-800" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 text-base font-semibold">
                <a href="{{ url_for('index') }}"
                    class="text-white block px-3 py-2 rounded-md hover:bg-botanical-800">Beranda</a>
                <a href="{{ url_for('diagnose') }}"
                    class="text-white block px-3 py-2 rounded-md hover:bg-botanical-800">Mulai Diagnosis</a>
                <a href="{{ url_for('diseases') }}"
                    class="text-white block px-3 py-2 rounded-md hover:bg-botanical-800">Kamus Penyakit</a>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer: Deep dark botanical green -->
    <footer class="bg-botanical-950 text-slate-400 py-10 border-t border-botanical-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                <div class="flex items-center">
                    <img src="{{ url_for('static', filename='images/logo-panjang.png') }}" alt="RoseCare Logo"
                        class="h-8 w-auto object-contain">
                </div>
                <p class="text-xs">
                    &copy; 2026 RoseCare. Kelompok 7 - Sistem Pakar TIF RM 22B
                </p>
                <div class="flex space-x-6 text-sm">
                    <a href="{{ url_for('index') }}" class="hover:text-white transition">Beranda</a>
                    <a href="{{ url_for('diagnose') }}" class="hover:text-white transition">Diagnosis</a>
                    <a href="{{ url_for('diseases') }}" class="hover:text-white transition">Kamus</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Script to toggle mobile menu -->
    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        if (btn && menu) {
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
            });
        }
    </script>
</body>

</html>
