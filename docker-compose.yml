version: "3.9"

services:
  web:
    build: .
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - web
    ports:
      - "8011:80"
    volumes:
      - .:/app:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped